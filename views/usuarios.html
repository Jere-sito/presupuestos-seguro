<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — Gyver Motos</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">Gyver Motos</a>
    <a href="/">← Presupuestos</a>
    <a href="/companias">Compañías</a>
    <div class="spacer"></div>
    <form action="/auth/logout" method="POST" style="margin:0">
      <button type="submit" class="btn btn-sm btn-secondary">Salir</button>
    </form>
  </nav>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Usuarios</h1>
    </div>

    <!-- Formulario agregar -->
    <form id="form-usuario" style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:16px;align-items:end">
      <div class="field-group" style="margin:0">
        <label>Nombre de usuario</label>
        <input type="text" id="u-nombre" required autocomplete="off">
      </div>
      <div class="field-group" style="margin:0">
        <label>Contraseña</label>
        <input type="password" id="u-password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary">Agregar</button>
    </form>
    <div id="msg-usuario" class="hidden mb-4"></div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr><th>Nombre</th><th>Creado</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tbody-usuarios"></tbody>
      </table>
    </div>
  </div>
  <script>
    async function cargar() {
      const res = await fetch('/api/usuarios');
      const lista = await res.json();
      document.getElementById('tbody-usuarios').innerHTML = lista.map(u => `
        <tr>
          <td><strong>${u.nombre}</strong></td>
          <td class="text-muted">${u.creado_en ? u.creado_en.split('T')[0] : ''}</td>
          <td>
            <button class="btn btn-sm btn-danger" onclick="eliminar(${u.id},'${u.nombre}')">Eliminar</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--muted)">Sin usuarios</td></tr>';
    }
    async function eliminar(id, nombre) {
      if (!confirm(`¿Eliminar al usuario "${nombre}"?`)) return;
      await fetch(`/api/usuarios/${id}`, { method: 'DELETE' });
      cargar();
    }
    document.getElementById('form-usuario').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await fetch('/api/usuarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre: document.getElementById('u-nombre').value,
          password: document.getElementById('u-password').value
        })
      });
      const msg = document.getElementById('msg-usuario');
      if (res.ok) {
        e.target.reset();
        msg.className = 'hidden';
        cargar();
      } else {
        const d = await res.json();
        msg.textContent = d.error;
        msg.className = 'alert alert-warning';
      }
    });
    cargar();
  </script>
</body>
</html>
