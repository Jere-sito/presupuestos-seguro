<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Gyver Motos</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <img src="/img/logo.png" alt="Gyver Motos" onerror="this.style.display='none'">
      <h1>Gyver Motos</h1>
      <p>Sistema de Presupuestos</p>
    </div>
    <form id="login-form">
      <div class="field-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" required autofocus autocomplete="username">
      </div>
      <div class="field-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.classList.add('hidden');
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('usuario').value,
          password: document.getElementById('password').value
        })
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json();
        err.textContent = data.error || 'Error al ingresar';
        err.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
